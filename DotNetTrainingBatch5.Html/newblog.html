<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog CRUD New</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex flex-column mt-5 ms-5">
        <div class="mb-3">
            <label for="txtTitle" class="form-label">Blog Title</label>
            <input type="text" class="form-control" id="txtTitle" placeholder="">
        </div>
        <div class="mb-3">
            <label for="txtAuthor" class="form-label">Blog Author</label>
            <input type="text" class="form-control" id="txtAuthor" placeholder="">
        </div>
        <div class="mb-3">
            <label for="txtContent" class="form-label">Blog Content</label>
            <textarea class="form-control" id="txtContent" rows="3"></textarea>
        </div>
        <div class="">
            <button type="button" class="btn btn-success" id="btnSave">Save</button>
            <button type="button" class="btn btn-secondary" id="btnCancel">Cancel</button>
        </div>
        <br>
        <table class="table table-responsive">
            <thead>
                <th>Controls</th>
                <th>No.</th>
                <th>Title</th>
                <th>Author</th>
                <th>Content</th>
            </thead>
            <tbody id="tblBlogs">

            </tbody>
        </table>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/4.0.0/jquery.min.js"
        integrity="sha512-YuCuk5nNmVIUfKROKeV3fpZZ5Vt9vsnq8nExr5JwEJc2r1YDVmDfujcq373eHIzjqdxwCzoKpxngIaAdRUyg3A=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        $('#btnCancel').click(() => {
            clearControl();
        })

        $('#btnSave').click(() => {
            if(editid == null){
                getControl();
                alert('Created Successfully');
            }else{
                updateControl();
            }
            
            clearControl();      
            loadData();
        })

        function clearControl() {
            $('#txtTitle').val('');
            $('#txtContent').val('');
            $('#txtAuthor').val('');
        }

        function getControl() {
            let title = $('#txtTitle').val();
            let content = $('#txtContent').val();
            let author = $('#txtAuthor').val();

            let item = getData();
            const uuid = crypto.randomUUID();

            const blog = {
                bid: uuid,
                btitle: title,
                bcontent: content,
                bauthor: author
            };
            item.push(blog);

            localStorage.setItem('newblog', JSON.stringify(item));
        }

        function updateControl(){
            let title = $('#txtTitle').val();
            let content = $('#txtContent').val();
            let author = $('#txtAuthor').val();

            let item = getData();

            let index = item.findIndex(x=>x.bid==editid);
            item[index].btitle = title;
            item[index].bcontent = content;
            item[index].bauthor = author;

            localStorage.setItem('newblog', JSON.stringify(item));

            clearControl();

            editid == null;

            alert("updated successfully");

            loadData();
        }
        //31min
        //no room -> create room
        //if exists -> create one

        $(document).ready(function () {
            loadData();
        })

        function getData(){
            let data = localStorage.getItem('newblog');
            if (data == null) {
                data = [];
            } else {
                data = JSON.parse(data);
            }
            return data;
        }

        function loadData() {
            let data = getData();

            $('#tblBlogs').html('');
            for (let i = 0; i < data.length; i++) {
                const blog = data[i];
                const tr = `
                    <tr>
                        <td>
                            <button type="button" class="btn btn-warning btn-edit" id="btnupdate" data-blog-id="${blog.bid}">Edit</button>
                            <button type="button" class="btn btn-danger btn-del" id="btndelete" data-blog-id="${blog.bid}">Delete</button>
                        </td>
                        <td>${i+1}</td>
                        <td>${blog.bauthor}</td>
                        <td>${blog.btitle}</td>
                        <td>${blog.bcontent}</td>
                    </tr>
                `;
                $('#tblBlogs').append(tr);      
            }
            bindEditbtn();
            bindDelete();
        }

        let editid = null;
        function bindEditbtn(){
            $('.btn-edit').click(function(){
                let id = $(this).data('blog-id');
                let data = getData();
                let data1 = data.filter(x => x.bid == id);
                console.log(data1);  
                let data2 = data1[0];

                $('#txtTitle').val(data2.btitle);
                $('#txtContent').val(data2.bcontent);
                $('#txtAuthor').val(data2.bauthor); 

                editid = data2.bid;
            })
        }

        function bindDelete(){
            $('.btn-del').click(function(){

                let id = $(this).data('blog-id');
                
                let data = getData();
                data = data.filter(x => x.bid != id);

                localStorage.setItem('newblog', JSON.stringify(data));

                clearControl();

                editid = null;

                alert("deleted successfully");

                loadData();
            });
        }

        // $(document).ready(function () {
        //     const uuid = crypto.randomUUID();
        //     console.log(uuid);

        //     let item = localStorage.getItem('newblog');
        //     console.log(item);

        //     const blog1 = {

        //         bcontent: 'test content'
        //     };

        //     if (item == null) {
        //         item = [];

        //         item = JSON.parse(item);

        //     item.push(blog1);
        //     console.log(item);

        //     const jsonString = JSON.stringify(item);
        //     localStorage.setItem('newblog', jsonString);
        // })
    </script>

</body>

</html>
