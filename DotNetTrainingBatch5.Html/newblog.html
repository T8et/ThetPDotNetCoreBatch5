<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog CRUD New</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex flex-column mt-5 ms-5">
        <div class="mb-3">
            <label for="txtTitle" class="form-label">Blog Title</label>
            <input type="text" class="form-control" id="txtTitle" placeholder="">
        </div>
        <div class="mb-3">
            <label for="txtAuthor" class="form-label">Blog Author</label>
            <input type="text" class="form-control" id="txtAuthor" placeholder="">
        </div>
        <div class="mb-3">
            <label for="txtContent" class="form-label">Blog Content</label>
            <textarea class="form-control" id="txtContent" rows="3"></textarea>
        </div>
        <div class="">
            <button type="button" class="btn btn-success" id="btnSave">Save</button>
            <button type="button" class="btn btn-secondary" id="btnCancel">Cancel</button>
        </div>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/4.0.0/jquery.min.js"
        integrity="sha512-YuCuk5nNmVIUfKROKeV3fpZZ5Vt9vsnq8nExr5JwEJc2r1YDVmDfujcq373eHIzjqdxwCzoKpxngIaAdRUyg3A=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        $('#btnCancel').click(() => {
            clearControl();
        })

        $('#btnSave').click(()=>{
            getControl();
        })

        function clearControl(){
            $('#txtTitle').val('');
            $('#txtContent').val('');
            $('#txtAuthor').val('');
        }

        function getControl(){
            let title = $('#txtTitle').val();
            let content = $('#txtContent').val();
            let author = $('#txtAuthor').val();

            const blog = {
                btitle : title,
                bcontent : content,
                bauthor : author
            };

            localStorage.setItem('blogs',JSON.stringify(blog));
        }
        //31min
    </script>

</body>

</html>
