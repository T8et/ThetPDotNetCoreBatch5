<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex Blog CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="d-flex justify-content-center align-item-center row">
        <div class="d-flex flex-column mt-3 container-sm border border-primary rounded-start col-md-6">
            <div class="h2 mb-3 mt-3 text-primary text-center">BLOG CRUD with Local Storage</div>
            <div class="m-3">
                <label for="lblTitle" class="col-4 form-label">Blog Title</label>
                <input type="email" class="col-8 form-control" id="lblTitle" placeholder="">
            </div>
            <div class="m-3">
                <label for="lblContent" class="form-label">Blog Content</label>
                <textarea class="form-control" id="lblContent" rows="3"></textarea>
            </div>
            <div class="m-3">
                <label for="lblAuthor" class="form-label">Blog Author</label>
                <input type="email" class="form-control" id="lblAuthor" placeholder="">
            </div>
            <div class="m-3 text-end">
                <button type="button" id="save" class="btn btn-success">Save</button>
                <button type="button" id="clear" class="btn btn-warning">Clear</button>
            </div>
        </div>
        <div class="d-flex flex-column mt-3 container-sm border border-primary rounded-end col-md-6">
            <table class="table table-striped">
                <thead>
                    <th>No.</th>
                    <th>Title</th>
                    <th>Content</th>
                    <th>Author</th>
                    <th>Controls</th>
                </thead>
                <tbody id="tdata">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container position-fixed top-0 start-50 p-3">
        <div id="clearToast" class="toast align-items-center text-bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Controls cleared successfully
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 start-50 p-3">
        <div id="saveToast" class="toast align-items-center text-bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Saved successfully.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 start-50 p-3">
        <div id="editToast" class="toast align-items-center text-bg-warning border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Please update controls
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 start-50 p-3">
        <div id="updToast" class="toast align-items-center text-bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Success Update Control
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 start-50 p-3">
        <div id="delToast" class="toast align-items-center text-bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Success Delete Control
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/4.0.0/jquery.min.js"
        integrity="sha512-YuCuk5nNmVIUfKROKeV3fpZZ5Vt9vsnq8nExr5JwEJc2r1YDVmDfujcq373eHIzjqdxwCzoKpxngIaAdRUyg3A=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>

    <script>

        $(document).ready(function () {
            showData();
        });

        $('#clear').click(function () {
            clearControl();
            let toastEl = document.getElementById('clearToast');
            let toast = new bootstrap.Toast(toastEl);
            toast.show();
        })

        $('#save').click(function(){
            if(editId == null){
                saveData();
            }else{
                updateControl();
            }
            
            let toastE2 = document.getElementById('saveToast');
            let toast = new bootstrap.Toast(toastE2);
            toast.show();
        })

        function loadData() {
            let data = '';
            data = localStorage.getItem('newblog');
            if (data == null) {
                data = [];
            } else {
                data = JSON.parse(data);
            }
            return data;
        }

        function showData() {
            let loaddata = loadData();
            if (loaddata.length == 0) {
                let databody = `
                    <tr>
                        <td colspan="5" class="text-danger">No Data...</td>
                    </tr>
                `;
                $('#tdata').append(databody);
            } else {
                $('#tdata').html('');
                for(let i = 0; i < loaddata.length; i++){
                    const blog = loaddata[i]
                    const databody = `
                    <tr>
                        <td>${i+1}</td>
                        <td>${blog.btitle}</td>
                        <td>${blog.bcontent}</td>
                        <td>${blog.bauthor}</td>
                        <td>
                            <button type="button" id="edit" class="btn btn-edit btn-secondary" data-blog-id="${blog.bid}">Edit</button>
                            <button type="button" id="delete" class="btn btn-delete btn-danger" data-blog-id="${blog.bid}">Delete</button>
                        <td>
                    </tr>
                    `;
                    $('#tdata').append(databody);
                }
                bindEditbtn();  
                bindDelbtn();         
            }
        }

        function updateControl(){
            let title = $('#lblTitle').val();
            let content = $('#lblContent').val();
            let author = $('#lblAuthor').val();

            let item = loadData();

            let index = item.findIndex(x=>x.bid==editId);
        
            item[index].btitle = title;
            item[index].bcontent = content;
            item[index].bauthor = author;
            
            localStorage.setItem('newblog', JSON.stringify(item));

            clearControl();

            editId = null;

            let toastE4 = document.getElementById('updToast');
            let toast = new bootstrap.Toast(toastE4);
            toast.show();
        
            showData();        
        }

        function saveData(){
            let savedata = loadData();

            let stitle = $('#lblTitle').val();
            let scontent = $('#lblContent').val();
            let sauthor = $('#lblAuthor').val();

            const uuid = crypto.randomUUID();

            let sobj = {
                bid : uuid,
                btitle : stitle,
                bcontent : scontent,
                bauthor : sauthor
            };

            savedata.push(sobj);

            localStorage.setItem('newblog', JSON.stringify(savedata));
            clearControl();
            showData();
        }

        function clearControl() {
            $('#lblTitle').val('');
            $('#lblContent').val('');
            $('#lblAuthor').val('');
        }

        let editId = null;
        function bindEditbtn(){     
            $('.btn-edit').click(function(){
                const eid = $(this).data('blog-id');
                let edata = loadData();
                let sdata = edata.filter(x=>x.bid == eid);
                let editData = sdata[0];

                $('#lblTitle').val(editData.btitle);
                $('#lblContent').val(editData.bcontent);
                $('#lblAuthor').val(editData.bauthor);
                editId = editData.bid;

                let toastE3 = document.getElementById('editToast');
                let toast = new bootstrap.Toast(toastE3);
                toast.show();
            })
        }

        function bindDelbtn(){
            $('.btn-delete').click(function(){
                let id = $(this).data('blog-id');
                
                let data = loadData();
                data = data.filter(x => x.bid != id);

                localStorage.setItem('newblog', JSON.stringify(data));

                clearControl();

                editId = null;

                let toastE6 = document.getElementById('delToast');
                let toast = new bootstrap.Toast(toastE6);
                toast.show();
                
                showData();
            })
        }
    </script>


</body>

</html>
